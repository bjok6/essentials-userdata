name: EssentialsUserData
version: ${project.version}
main: net.ess3.userdata.UserDataPlugin
api-version: '1.20'
authors: [essentialsx-community]
website: https://github.com/${github.repository}
description: Asynchronous offline player data cache and session warmup for EssentialsX.
softdepend: [Essentials, EssentialsX, Vault]
load: POSTWORLD

commands:
  userdata:
    description: Essentials offline user-data cache controls
    usage: /userdata <status|reload|clear>
    permission: essentials.userdata.admin
    aliases: [udcache, essdata]

permissions:
  essentials.userdata.admin:
    description: Administer the user data cache module
    default: op
  essentials.userdata.use:
    description: Allow cache-backed lookups
    default: true
